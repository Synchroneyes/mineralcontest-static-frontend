<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA fallback:
    // convert /some/path?x=1#y to /?p=/some/path&q=?x=1#y
    (function () {
      var pathSegmentsToKeep = 0;
      var l = window.location;
      var base = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '');
      var keptPath = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
      var routePath = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/');
      var routeSearch = l.search ? l.search.replace(/&/g, '~and~') : '';
      var target = base + keptPath + '/?p=/' + routePath + '&q=' + routeSearch + l.hash;
      l.replace(target);
    })();
  </script>
</head>
<body>
</body>
</html>
